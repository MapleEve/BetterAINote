version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: betterainote-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_PATH: /app/data/betterainote.db
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      APP_URL: ${APP_URL:-http://localhost:3000}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LOCAL_STORAGE_PATH: /app/audio
      SYNC_WORKER_TICK_MS: ${SYNC_WORKER_TICK_MS:-60000}
      RUN_MIGRATIONS: "true"
    volumes:
      - ${APP_DATA_PATH:-./data/app}:/app/data
      - ${RECORDINGS_PATH:-./data/recordings}:/app/audio
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 30s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: betterainote-worker
    restart: unless-stopped
    environment:
      DATABASE_PATH: /app/data/betterainote.db
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      APP_URL: ${APP_URL:-http://localhost:3000}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LOCAL_STORAGE_PATH: /app/audio
      SYNC_WORKER_TICK_MS: ${SYNC_WORKER_TICK_MS:-60000}
      RUN_MIGRATIONS: "false"
    volumes:
      - ${APP_DATA_PATH:-./data/app}:/app/data
      - ${RECORDINGS_PATH:-./data/recordings}:/app/audio
    command: ["bun", "worker.js"]
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "src/worker/healthcheck.ts"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
