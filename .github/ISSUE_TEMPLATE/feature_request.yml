name: Feature request
description: Suggest a product improvement for BetterAINote
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.

        Use one request per issue and explain the user problem first, not just the implementation.
        Keep the request focused on one workflow or problem so it can be evaluated cleanly.
        BetterAINote is a single-user recording workspace, so requests should match that product boundary.
        Privacy reminder: do not paste tokens, cookies, organization IDs, user IDs, recording IDs, meeting titles, private screenshot content, HAR files, full environment files, or internal/local filesystem paths. Redact examples before sharing them.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user problem or workflow gap.
      placeholder: What problem or use case should BetterAINote handle better?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the product behavior you want to see.
      placeholder: What should the product do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or alternative solutions you considered.

  - type: dropdown
    id: area
    attributes:
      label: Product area
      description: Which area is this request about?
      options:
        - Data sources and sync
        - Private transcription / VoScript
        - Speaker review / voiceprints
        - AI rename / titles
        - User interface
        - Settings and configuration
        - Authentication and onboarding
        - Performance
        - Other
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      description: How important is this for your workflow?
      options:
        - Nice to have
        - Useful
        - Important
        - Critical
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Examples, references, or mockups
      description: Link to examples, screenshots, or related workflows if they help explain the request.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add anything else that would help evaluate the request.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this request.
          required: true
        - label: I described the user problem, not just a technical implementation detail.
          required: true
        - label: I removed or redacted tokens, cookies, org/user/recording IDs, meeting titles, private screenshot content, HAR data, env values, and internal paths from this request.
          required: true
        - label: I can help validate the feature if it gets implemented.
          required: false
